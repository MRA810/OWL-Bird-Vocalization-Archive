{% extends "base.html" %}
{% block title %}404 — Not Found — OWL{% endblock %}
{% block content %}
<div class="container" style="text-align:center;padding:6rem 2rem;">
  <div style="font-size:6rem;font-family:var(--font-display);font-weight:800;color:var(--card-dark);line-height:1;">404</div>
  <h2 style="font-family:var(--font-display);font-size:2rem;font-weight:800;margin:1rem 0 0.5rem;">Bird not found</h2>
  <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem;">This species may have flown away or never existed in the archive.</p>
  <a href="{{ url_for('public.home') }}" class="btn btn-accent btn-lg">← Return to Archive</a>
</div>
{% endblock %}
