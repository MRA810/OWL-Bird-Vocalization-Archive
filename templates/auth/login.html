{% extends "base.html" %}
{% block title %}Login — OWL{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="form-card">
    <div class="auth-brand">
      <div class="auth-brand-logo">◉</div>
      <div class="auth-brand-name">OWL</div>
      <div class="auth-brand-tagline">Bird Vocalization Archive</div>
    </div>

    <div class="form-title">Welcome back</div>
    <div class="form-subtitle">Sign in to manage your archive</div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label" for="identifier">Email or Username</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          class="form-control"
          placeholder="you@example.com or @username"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn btn-accent btn-full btn-lg">Sign In →</button>
    </form>

    <div class="form-divider">or</div>
    <div class="form-footer">
      Don't have an account?
      <a href="{{ url_for('auth.signup') }}">Join the Archive</a>
    </div>
  </div>
</div>
{% endblock %}
